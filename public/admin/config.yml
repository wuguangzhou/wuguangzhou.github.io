# Netlify CMS 配置文件 · 周游·记
# 使用 test-repo 后端（公开仓库免认证）

backend:
  name: test-repo
  repo: wuguangzhou/wuguangzhou.github.io
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

site_url: https://wuguangzhou.github.io
display_url: https://wuguangzhou.github.io

collections:
  - name: "blog"
    label: "文章"
    label_singular: "文章"
    folder: "src/content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "发布日期", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "摘要", name: "description", widget: "string" }
      - { label: "标签", name: "tags", widget: "list", default: [], required: false }
      - { label: "正文", name: "body", widget: "markdown" }

  - name: "portfolio"
    label: "作品"
    label_singular: "作品"
    folder: "src/content/portfolio"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "项目名称", name: "title", widget: "string" }
      - { label: "年份", name: "year", widget: "number" }
      - { label: "分类", name: "category", widget: "select", options: ["开源项目", "独立开发"] }
      - { label: "角色", name: "role", widget: "string", required: false }
      - { label: "技术栈", name: "techStack", widget: "list", default: [] }
      - { label: "项目链接", name: "url", widget: "string", required: false }
      - { label: "描述", name: "description", widget: "text" }
      - { label: "正文", name: "body", widget: "markdown", required: false }

  - name: "about"
    label: "关于页"
    files:
      - name: "about"
        label: "个人信息"
        file: "src/content/about/about.md"
        fields:
          - { label: "个人简介", name: "bio", widget: "text" }
          - { label: "座右铭", name: "motto", widget: "text" }
          - { label: "技术栈", name: "techStack", widget: "list", default: [] }
          - { label: "目前在做什么", name: "doing", widget: "list", default: [] }
